<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Callstya Aldevira 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --pink: #ff8fb1;
}

/* GLOBAL */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  transition: 0.5s;
}

/* AUTO DARK */
@media (prefers-color-scheme: dark) {
  body { background:#0f0f14; color:#eee; }
}
@media (prefers-color-scheme: light) {
  body { background:#fff0f5; color:#444; }
}

/* INTRO */
.intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  animation: fadeOut 3s forwards 2s;
}

@keyframes fadeOut {
  to { opacity:0; visibility:hidden; }
}

/* HERO */
.hero {
  height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1 {
  font-size:48px;
  color: var(--pink);
}

/* SLIDESHOW */
.slideshow {
  height: 80vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.slideshow img {
  width: 90%;
  border-radius:20px;
  opacity:0;
  position:absolute;
  transition: opacity 2s;
}

.slideshow img.active {
  opacity:1;
}

/* CHAT */
.chat {
  padding:40px 20px;
}

.bubble {
  max-width:70%;
  padding:10px;
  border-radius:15px;
  margin:10px;
  opacity:0;
  transform:translateY(20px);
  transition:0.5s;
}

.me { background:#ff8fb1; margin-left:auto; color:white;}
.her { background:#eee; }

.bubble.show {
  opacity:1;
  transform:translateY(0);
}

/* LETTER */
.section {
  padding:80px 20px;
  text-align:center;
}

.letter p {
  opacity:0;
  transform:translateY(20px);
  transition:1s;
}

.letter p.show {
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro">Loading your story...</div>

<!-- HERO -->
<section class="hero">
  <h1>Happy Birthday 💖<br>Callstya Aldevira</h1>
</section>

<!-- SLIDESHOW -->
<section class="slideshow">
  <img src="https://picsum.photos/900/600?1" class="slide active">
  <img src="https://picsum.photos/900/600?2" class="slide">
  <img src="https://picsum.photos/900/600?3" class="slide">
</section>

<!-- CHAT -->
<section class="chat">
  <div class="bubble me">Hai kamu 💖</div>
  <div class="bubble her">Iya kenapa?</div>
  <div class="bubble me">Aku cuma mau bilang sesuatu...</div>
  <div class="bubble me">Aku sayang kamu 😭</div>
</section>

<!-- LETTER -->
<section class="section">
  <h2>Untuk Kamu 💌</h2>
  <div class="letter">
    <p>Selamat ulang tahun, Callstya 💖</p>
    <p>Aku bersyukur banget bisa kenal kamu.</p>
    <p>Semoga kamu selalu bahagia.</p>
    <p>Dan semoga aku tetap ada di hidup kamu 🌸</p>
  </div>
</section>

<script>
// MUSIC
let audio = new Audio("lagu.mp3");
audio.volume = 0;

window.addEventListener("click", () => {
  audio.play();
  let fade = setInterval(()=>{
    if(audio.volume<1) audio.volume+=0.05;
    else clearInterval(fade);
  },200);
});

// PAUSE KALO PINDAH TAB
document.addEventListener("visibilitychange",()=>{
  if(document.hidden) audio.pause();
  else audio.play();
});

// SLIDESHOW
let slides = document.querySelectorAll(".slide");
let i = 0;

setInterval(()=>{
  slides[i].classList.remove("active");
  i = (i+1)%slides.length;
  slides[i].classList.add("active");
},4000);

// CHAT ANIMATION
let bubbles = document.querySelectorAll(".bubble");
bubbles.forEach((b,i)=>{
  setTimeout(()=>b.classList.add("show"), i*1000);
});

// LETTER ANIMATION
let ps = document.querySelectorAll(".letter p");
ps.forEach((p,i)=>{
  setTimeout(()=>p.classList.add("show"), i*1200);
});
</script>

</body>
</html>
