<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LDR Story 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --pink: #ff8fb1;
  --bg: linear-gradient(180deg, #fff0f5, #ffe4ec);
}

body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  overflow-x:hidden;
  color:#444;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1 {
  font-family:'Playfair Display',serif;
  color:var(--pink);
}

/* MAP */
.map {
  position:relative;
  height:300px;
  margin:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(10px);
}

.point {
  position:absolute;
  width:12px;
  height:12px;
  background:var(--pink);
  border-radius:50%;
}

.line {
  position:absolute;
  height:2px;
  background:var(--pink);
  transform-origin:left;
}

/* LABEL */
.label {
  position:absolute;
  font-size:12px;
  color:#666;
}

/* CHAT */
.chat {
  padding:20px;
}

.bubble {
  max-width:70%;
  padding:10px;
  margin:10px;
  border-radius:15px;
  opacity:0;
  transform:translateY(20px);
  transition:0.5s;
}

.me {background:#ff8fb1;color:white;margin-left:auto;}
.her {background:#eee;}

.bubble.show {
  opacity:1;
  transform:translateY(0);
}

/* PARTICLE */
.particle {
  position:fixed;
  animation:float 8s linear infinite;
}

@keyframes float {
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>Kita Jauh… Tapi Tetap Satu 💖</h1>
</section>

<!-- MAP -->
<div class="map">
  <!-- titik kamu -->
  <div class="point" style="top:60%; left:20%;"></div>
  <div class="label" style="top:65%; left:20%;">Kamu</div>

  <!-- titik dia -->
  <div class="point" style="top:30%; left:70%;"></div>
  <div class="label" style="top:25%; left:70%;">Dia</div>

  <!-- garis -->
  <div class="line" id="line"></div>
</div>

<!-- CHAT -->
<section class="chat">
  <div class="bubble me">Aku kangen kamu 😔</div>
  <div class="bubble her">Aku juga kangen banget…</div>
  <div class="bubble me">Andai kita gak sejauh ini</div>
  <div class="bubble her">Tapi aku tetap mau sama kamu 💖</div>
  <div class="bubble me">Aku bakal tunggu kita ketemu nanti</div>
</section>

<script>
// GARIS MAP
const line = document.getElementById("line");

const x1 = 20, y1 = 60;
const x2 = 70, y2 = 30;

const length = Math.hypot(x2-x1, y2-y1);
const angle = Math.atan2(y2-y1, x2-x1);

line.style.width = length + "%";
line.style.left = x1 + "%";
line.style.top = y1 + "%";
line.style.transform = `rotate(${angle}rad)`;

// CHAT ANIMATION
const bubbles = document.querySelectorAll(".bubble");
bubbles.forEach((b,i)=>{
  setTimeout(()=>b.classList.add("show"), i*1200);
});

// PARTICLE
const icons = ["🌸","✨","💖","⭐"];

setInterval(()=>{
  let p = document.createElement("div");
  p.className="particle";
  p.innerHTML = icons[Math.floor(Math.random()*icons.length)];
  p.style.left=Math.random()*100+"vw";
  p.style.fontSize=(12+Math.random()*10)+"px";
  document.body.appendChild(p);

  setTimeout(()=>p.remove(),8000);
},400);
</script>

</body>
</html>
