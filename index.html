<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pekalongan ❤️ Medan</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --pink:#ff8fb1;
  --bg: linear-gradient(180deg,#fff0f5,#ffe4ec);
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  overflow-x:hidden;
  color:#444;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-family:'Playfair Display',serif;
  color:var(--pink);
}

/* MAP */
.map{
  position:relative;
  height:320px;
  margin:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
}

/* TITIK */
.point{
  position:absolute;
  width:14px;
  height:14px;
  background:var(--pink);
  border-radius:50%;
  box-shadow:0 0 10px pink;
}

/* LABEL */
.label{
  position:absolute;
  font-size:13px;
  font-weight:500;
}

/* GARIS */
.line{
  position:absolute;
  height:2px;
  background:var(--pink);
  transform-origin:left;
  opacity:0.7;
}

/* CHAT */
.chat{
  padding:20px;
}

.bubble{
  max-width:70%;
  padding:12px;
  margin:10px;
  border-radius:15px;
  opacity:0;
  transform:translateY(20px);
  transition:0.5s;
}

.me{background:#ff8fb1;color:white;margin-left:auto;}
.her{background:#eee;}

.bubble.show{
  opacity:1;
  transform:translateY(0);
}

/* PARTICLE */
.particle{
  position:fixed;
  animation:float 8s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>Pekalongan ❤️ Medan<br>Jauh, Tapi Tetap Kita 💖</h1>
</section>

<!-- MAP -->
<div class="map">

  <!-- Pekalongan -->
  <div class="point" style="top:70%; left:35%;"></div>
  <div class="label" style="top:75%; left:35%;">Pekalongan</div>

  <!-- Medan -->
  <div class="point" style="top:25%; left:65%;"></div>
  <div class="label" style="top:20%; left:65%;">Medan</div>

  <!-- Garis -->
  <div class="line" id="line"></div>

</div>

<!-- CHAT -->
<section class="chat">
  <div class="bubble me">Jauh banget ya kita…</div>
  <div class="bubble her">Iya… beda pulau 😔</div>
  <div class="bubble me">Tapi aku tetep milih kamu</div>
  <div class="bubble her">Aku juga… walaupun gak mudah 💖</div>
  <div class="bubble me">Suatu hari kita pasti ketemu</div>
  <div class="bubble her">Aku tunggu hari itu 🌸</div>
</section>

<script>
// GARIS DINAMIS
const line = document.getElementById("line");

const x1 = 35, y1 = 70;
const x2 = 65, y2 = 25;

const dx = x2 - x1;
const dy = y2 - y1;

const length = Math.sqrt(dx*dx + dy*dy);
const angle = Math.atan2(dy, dx);

line.style.width = length + "%";
line.style.left = x1 + "%";
line.style.top = y1 + "%";
line.style.transform = `rotate(${angle}rad)`;

// CHAT ANIMASI
const bubbles = document.querySelectorAll(".bubble");
bubbles.forEach((b,i)=>{
  setTimeout(()=>b.classList.add("show"), i*1200);
});

// PARTICLE
const icons = ["🌸","✨","💖","⭐"];

setInterval(()=>{
  let p = document.createElement("div");
  p.className="particle";
  p.innerHTML=icons[Math.floor(Math.random()*icons.length)];
  p.style.left=Math.random()*100+"vw";
  p.style.fontSize=(12+Math.random()*10)+"px";
  document.body.appendChild(p);

  setTimeout(()=>p.remove(),8000);
},400);
</script>

</body>
</html>
