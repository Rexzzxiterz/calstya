<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Callstya Aldevira Fitria Ermian 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --pink: #ff8fb1;
  --bg-light: linear-gradient(180deg, #fff0f5, #ffe4ec);
  --bg-dark: #0f0f14;
  --text-light: #444;
  --text-dark: #eee;
}

/* AUTO DARK MODE */
@media (prefers-color-scheme: dark) {
  body {
    background: var(--bg-dark);
    color: var(--text-dark);
  }
}

@media (prefers-color-scheme: light) {
  body {
    background: var(--bg-light);
    color: var(--text-light);
  }
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  color: var(--pink);
}

/* CARD */
.card {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(14px);
  border-radius: 20px;
  padding: 30px;
  margin: 20px;
}

/* SECTION */
.section {
  max-width: 800px;
  margin: auto;
  padding: 80px 20px;
  text-align: center;
}

/* IMAGE BLUR EFFECT */
.image img {
  width: 100%;
  border-radius: 20px;
  filter: blur(10px);
  transition: 1.2s ease;
}

.image.show img {
  filter: blur(0);
}

/* LETTER */
.letter p {
  opacity: 0;
  transform: translateY(20px);
  transition: 1s;
  margin-bottom: 15px;
}

.letter p.show {
  opacity: 1;
  transform: translateY(0);
}

/* TITLE */
h2 {
  color: var(--pink);
}

/* FADE */
.fade {
  opacity: 0;
  transform: translateY(30px);
  transition: 1s;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero fade">
  <h1>Happy Birthday<br>Callstya Aldevira</h1>
</section>

<!-- IMAGE -->
<section class="section fade image">
  <div class="card">
    <img src="https://picsum.photos/900/600">
  </div>
</section>

<!-- LETTER -->
<section class="section fade">
  <div class="card">
    <h2>Untuk Kamu 💌</h2>
    <div class="letter" id="letter">
      <p>Selamat ulang tahun, Callstya 💖</p>
      <p>Aku gak tau harus mulai dari mana,</p>
      <p>tapi yang pasti… aku bersyukur banget bisa kenal kamu.</p>
      <p>Semoga hari kamu selalu dipenuhi hal-hal baik,</p>
      <p>dan semoga aku masih ada di setiap cerita indah kamu 🌸</p>
    </div>
  </div>
</section>

<script>
// FADE SECTION
const fades = document.querySelectorAll(".fade");
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add("show");
  });
});
fades.forEach(el => observer.observe(el));

// IMAGE BLUR TRIGGER
const imgSection = document.querySelector(".image");
observer.observe(imgSection);

// LETTER PER PARAGRAF
const paragraphs = document.querySelectorAll(".letter p");

let delay = 0;
const letterObserver = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      paragraphs.forEach((p, i) => {
        setTimeout(() => {
          p.classList.add("show");
        }, i * 800);
      });
    }
  });
});

letterObserver.observe(document.querySelector(".letter"));
</script>

</body>
</html>
