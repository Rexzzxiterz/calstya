<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aldevira 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --bg: linear-gradient(180deg, #fff0f5, #ffe4ec);
  --text: #4a4a4a;
  --pink: #ff8fb1;
  --soft: rgba(255,255,255,0.6);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  color: var(--pink);
}

.hero p {
  margin-top: 10px;
  opacity: 0.7;
}

/* GLASS CARD */
.card {
  background: var(--soft);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 30px;
  margin: 20px;
}

/* SECTION */
.section {
  max-width: 800px;
  margin: auto;
  padding: 80px 20px;
  text-align: center;
}

/* IMAGE */
.image img {
  width: 100%;
  border-radius: 20px;
  margin-top: 20px;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap: 15px;
}

.gallery img {
  width: 100%;
  border-radius: 15px;
  transition: 0.4s;
}

.gallery img:hover {
  transform: scale(1.05);
}

/* TEXT */
h2 {
  font-family: 'Playfair Display', serif;
  color: var(--pink);
}

p {
  line-height: 1.7;
}

/* FADE */
.fade {
  opacity: 0;
  transform: translateY(30px);
  transition: 1s;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* FLOAT HEART */
.heart {
  position: fixed;
  color: #ffb6c1;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh);}
  100% { transform: translateY(-10vh);}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero fade">
  <div>
    <h1>Happy Birthday 💖</h1>
    <p>Aldevira Fitria Ermian</p>
  </div>
</section>

<!-- IMAGE -->
<section class="section fade">
  <div class="card image">
    <img src="https://picsum.photos/900/600">
  </div>
</section>

<!-- STORY -->
<section class="section fade">
  <div class="card">
    <h2>Kenangan 🌷</h2>
    <p>
      Dari semua hal sederhana yang pernah terjadi,  
      kamu selalu jadi bagian yang paling berarti.  
    </p>
  </div>
</section>

<!-- GALLERY -->
<section class="section">
  <div class="gallery">
    <img src="https://picsum.photos/400/500?1">
    <img src="https://picsum.photos/400/500?2">
    <img src="https://picsum.photos/400/500?3">
  </div>
</section>

<!-- MESSAGE -->
<section class="section fade">
  <div class="card">
    <h2>Untuk Kamu 💌</h2>
    <p>
      Selamat ulang tahun 💖  
      Semoga hari-hari kamu selalu dipenuhi kebahagiaan.  
      Dan semoga aku tetap ada di setiap senyum kamu 🌸
    </p>
  </div>
</section>

<script>
// SCROLL ANIMATION
const elements = document.querySelectorAll('.fade');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
    }
  });
});

elements.forEach(el => observer.observe(el));

// HEART EFFECT (SOFT)
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (10 + Math.random() * 10) + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}, 800);
</script>

</body>
</html>
