<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pekalongan ❤️ Medan</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>

<style>
body { margin:0; font-family:sans-serif; }

#map { height:100vh; }

/* TITLE */
.title {
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,0.85);
  padding:10px 20px;
  border-radius:20px;
  z-index:999;
  font-weight:bold;
}

/* DISTANCE */
.distance {
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#ff8fb1;
  color:white;
  padding:10px 20px;
  border-radius:20px;
  z-index:999;
}

/* HEART */
.heart {
  position:absolute;
  font-size:14px;
  animation:float 4s linear infinite;
}

@keyframes float {
  0%{transform:translateY(0);}
  100%{transform:translateY(-50px); opacity:0;}
}
</style>
</head>

<body>

<div class="title">Pekalongan ❤️ Medan — Jauh Tapi Tetap Kita 💖</div>
<div class="distance" id="distance">Menghitung jarak...</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script>
// KOORDINAT
const pekalongan = [-6.8898, 109.6745];
const medan = [3.5952, 98.6722];

// MAP
const map = L.map('map').setView([0,105],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// MARKER
L.marker(pekalongan).addTo(map).bindPopup("Aku di Pekalongan 💖");
L.marker(medan).addTo(map).bindPopup("Kamu di Medan 🌸");

// GARIS PUTUS (ANIMASI)
let dashOffset = 0;
const line = L.polyline([pekalongan, medan], {
  color:'#ff4d88',
  weight:4,
  dashArray:'10,10'
}).addTo(map);

setInterval(()=>{
  dashOffset++;
  line.setStyle({ dashOffset: dashOffset });
},100);

// FIT
map.fitBounds(line.getBounds());

// HITUNG JARAK (KM)
function getDistance(lat1, lon1, lat2, lon2){
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a =
    Math.sin(dLat/2)*Math.sin(dLat/2)+
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)*Math.sin(dLon/2);
  const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  return R*c;
}

const dist = getDistance(pekalongan[0],pekalongan[1],medan[0],medan[1]);
document.getElementById("distance").innerHTML =
  "Jarak kita ± " + Math.round(dist) + " km 💔";

// PESAWAT ANIMASI
const plane = L.marker(pekalongan, {
  icon: L.divIcon({
    html:"✈️",
    className:"",
    iconSize:[20,20]
  })
}).addTo(map);

let t = 0;

function animatePlane(){
  t += 0.002;
  if(t>1) t=0;

  const lat = pekalongan[0] + (medan[0]-pekalongan[0])*t;
  const lng = pekalongan[1] + (medan[1]-pekalongan[1])*t;

  plane.setLatLng([lat,lng]);

  requestAnimationFrame(animatePlane);
}
animatePlane();

// MUSIK
let audio = new Audio("lagu.mp3");
audio.volume = 0;

window.addEventListener("click",()=>{
  audio.play();
  let fade = setInterval(()=>{
    if(audio.volume<1) audio.volume+=0.05;
    else clearInterval(fade);
  },200);
});

// HEART EFFECT
setInterval(()=>{
  let heart = document.createElement("div");
  heart.className="heart";
  heart.innerHTML="💖";
  heart.style.left = Math.random()*100+"vw";
  heart.style.top = Math.random()*100+"vh";
  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),4000);
},500);
</script>

</body>
</html>
