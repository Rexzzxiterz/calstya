<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Untuk Kamu 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --pink: #ff8fb1;
  --bg: linear-gradient(180deg, #fff0f5, #ffe4ec);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: #444;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  color: var(--pink);
  font-size: 42px;
  text-shadow: 0 4px 20px rgba(0,0,0,0.15);
}

/* SECTION */
.section {
  max-width: 800px;
  margin: auto;
  padding: 80px 20px;
  text-align: center;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(14px);
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* IMAGE */
img {
  width: 100%;
  border-radius: 20px;
}

/* LETTER */
.letter p {
  opacity: 0;
  transform: translateY(20px);
  transition: 1s;
  margin-bottom: 15px;
}

.letter p.show {
  opacity: 1;
  transform: translateY(0);
}

/* PARTICLE */
.particle {
  position: fixed;
  font-size: 14px;
  animation: float 8s linear infinite;
  opacity: 0.7;
}

@keyframes float {
  0% { transform: translateY(100vh);}
  100% { transform: translateY(-10vh);}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>Walaupun Jauh...<br>Aku Tetap Sayang Kamu 💖</h1>
</section>

<!-- IMAGE -->
<section class="section">
  <div class="card">
    <img src="https://picsum.photos/900/600">
  </div>
</section>

<!-- LETTER -->
<section class="section">
  <div class="card">
    <h2 style="color:#ff8fb1;">Untuk Kamu 🌸</h2>
    <div class="letter">
      <p>Jarak ini memang gak mudah…</p>
      <p>Tapi setiap hari aku tetap milih kamu.</p>
      <p>Walaupun kita gak selalu bisa ketemu,</p>
      <p>kamu tetap jadi rumah buat aku 🌙</p>
      <p>Aku kangen… tapi aku juga bangga punya kamu 💖</p>
    </div>
  </div>
</section>

<script>
// LETTER ANIMATION
const ps = document.querySelectorAll(".letter p");
ps.forEach((p,i)=>{
  setTimeout(()=>p.classList.add("show"), i*1200);
});

// PARTICLE (BUNGA + BINTANG)
const symbols = ["🌸","✨","💮","⭐"];

setInterval(()=>{
  let el = document.createElement("div");
  el.className = "particle";
  el.innerHTML = symbols[Math.floor(Math.random()*symbols.length)];
  el.style.left = Math.random()*100+"vw";
  el.style.fontSize = (12 + Math.random()*10)+"px";
  document.body.appendChild(el);

  setTimeout(()=>el.remove(),8000);
},400);
</script>

</body>
</html>
