<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  color: white;
  overflow-x: hidden;
}

/* BACKGROUND VIDEO */
video.bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* GLASS */
.glass {
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  padding: 30px;
  margin: 20px;
  border-radius: 20px;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 40px;
  color: #ff4d88;
}

.btn {
  margin-top: 20px;
  padding: 10px 25px;
  border: 1px solid #ff4d88;
  border-radius: 25px;
  cursor: pointer;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap: 10px;
}

.gallery img {
  width: 100%;
  border-radius: 15px;
}

/* MUSIC BUTTON */
.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #ff4d88;
  padding: 10px 15px;
  border-radius: 50%;
  cursor: pointer;
}

/* ANIMATION */
.fade {
  opacity: 0;
  transform: translateY(30px);
  transition: 1s;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
<video class="bg" autoplay muted loop>
  <source src="bg.mp4" type="video/mp4">
</video>

<!-- HERO -->
<section class="hero">
  <div class="glass fade">
    <h1>Happy Birthday 💖</h1>
    <p>Untuk kamu yang paling spesial</p>
    <div class="btn" onclick="scrollDown()">Masuk</div>
  </div>
</section>

<!-- CONTENT -->
<section class="glass fade" id="content">
  <h2>Kenangan Kita</h2>
  <div class="gallery">
    <img src="foto1.jpg">
    <img src="foto2.jpg">
    <img src="foto3.jpg">
    <img src="foto4.jpg">
  </div>
</section>

<section class="glass fade">
  <h2>Pesan Untuk Kamu</h2>
  <p>
    Selamat ulang tahun 💖  
    Terima kasih sudah jadi bagian dari hidup aku.  
    Kamu bukan cuma spesial… kamu segalanya buat aku.
  </p>
</section>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="lagu.mp3" type="audio/mp3">
</audio>

<div class="music-btn" onclick="toggleMusic()">🎵</div>

<script>
// scroll
function scrollDown() {
  document.getElementById("content").scrollIntoView({ behavior: "smooth" });
}

// music
let music = document.getElementById("music");
function toggleMusic() {
  if (music.paused) music.play();
  else music.pause();
}

// scroll animation
const fades = document.querySelectorAll(".fade");

window.addEventListener("scroll", () => {
  fades.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      el.classList.add("show");
    }
  });
});
</script>

</body>
</html>
