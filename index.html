<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pekalongan ❤️ Medan</title>

<!-- LEAFLET CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#fff0f5;
}

/* MAP */
#map {
  height: 100vh;
}

/* TITLE */
.title {
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,0.8);
  padding:10px 20px;
  border-radius:20px;
  font-weight:bold;
  z-index:999;
}
</style>
</head>

<body>

<div class="title">Pekalongan ❤️ Medan (Jauh, Tapi Tetap Kita 💖)</div>

<div id="map"></div>

<!-- LEAFLET JS -->
<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script>
// KOORDINAT
const pekalongan = [-6.8898, 109.6745];
const medan = [3.5952, 98.6722];

// INIT MAP
const map = L.map('map').setView([0, 105], 5);

// TILE (MAP STYLE GOOGLE)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'© OpenStreetMap'
}).addTo(map);

// MARKER
const marker1 = L.marker(pekalongan).addTo(map)
  .bindPopup("Aku di Pekalongan 💖");

const marker2 = L.marker(medan).addTo(map)
  .bindPopup("Kamu di Medan 🌸");

// GARIS LDR
const line = L.polyline([pekalongan, medan], {
  color: '#ff4d88',
  weight: 4,
  opacity: 0.7
}).addTo(map);

// AUTO ZOOM FIT
map.fitBounds(line.getBounds());

// POPUP AUTO
marker1.openPopup();

// OPTIONAL PARTICLE SIMPLE
setInterval(()=>{
  document.title = "💖 Pekalongan ❤️ Medan 💖";
},2000);
</script>

</body>
</html>
