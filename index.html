<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aldevira</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #fff;
  color: #1d1d1f;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.hero h1 {
  font-size: 60px;
}

.hero p {
  color: #666;
}

/* SECTION */
.section {
  padding: 120px 20px;
  text-align: center;
  max-width: 900px;
  margin: auto;
}

/* IMAGE */
.image {
  height: 80vh;
  overflow: hidden;
}

.image img {
  width: 100%;
  height: 120%;
  object-fit: cover;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 20px;
}

.gallery img {
  width: 100%;
  border-radius: 12px;
}

/* TEXT */
h2 {
  font-size: 32px;
}

p {
  color: #666;
  line-height: 1.7;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1 class="title">Happy Birthday</h1>
  <p class="subtitle">Aldevira Fitria Ermian</p>
</section>

<!-- PARALLAX -->
<section class="image">
  <img src="https://picsum.photos/1200/800" class="parallax">
</section>

<!-- STORY -->
<section class="section">
  <h2 class="reveal">Kenangan</h2>
  <p class="reveal">
    Tidak semua momen harus besar untuk terasa berarti.  
    Karena hal kecil pun jadi indah saat kamu ada di dalamnya.
  </p>
</section>

<!-- ZOOM IMAGE -->
<section class="image">
  <img src="https://picsum.photos/1000/700" class="zoom">
</section>

<!-- GALLERY -->
<section class="section gallery">
  <img src="https://picsum.photos/500/600?1" class="zoom">
  <img src="https://picsum.photos/500/600?2" class="zoom">
  <img src="https://picsum.photos/500/600?3" class="zoom">
</section>

<!-- MESSAGE -->
<section class="section">
  <h2 class="reveal">Untuk Kamu</h2>
  <p class="reveal">
    Selamat ulang tahun.  
    Semoga semua hal baik selalu datang ke hidup kamu.  
    Dan semoga aku tetap ada di setiap cerita itu.
  </p>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

// TEXT REVEAL
gsap.utils.toArray(".reveal").forEach(el => {
  gsap.from(el, {
    opacity: 0,
    y: 50,
    duration: 1,
    scrollTrigger: {
      trigger: el,
      start: "top 80%",
    }
  });
});

// PARALLAX
gsap.to(".parallax", {
  yPercent: 20,
  ease: "none",
  scrollTrigger: {
    trigger: ".parallax",
    scrub: true
  }
});

// ZOOM EFFECT
gsap.utils.toArray(".zoom").forEach(img => {
  gsap.from(img, {
    scale: 1.2,
    duration: 1.5,
    scrollTrigger: {
      trigger: img,
      start: "top 80%",
    }
  });
});
</script>

</body>
</html>
