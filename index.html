<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu ❤️</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #000;
  color: white;
  overflow-x: hidden;
}

/* START */
.start {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

button {
  padding: 15px 30px;
  background: #ff4d88;
  border: none;
  border-radius: 30px;
  color: white;
  font-size: 18px;
  box-shadow: 0 0 20px #ff4d88;
  cursor: pointer;
}

.hidden { display: none; }

/* VIDEO */
.video {
  text-align: center;
  padding: 20px;
}

video {
  width: 90%;
  max-width: 400px;
  border-radius: 20px;
}

/* CHAT */
.chat {
  padding: 20px;
}

.bubble {
  max-width: 70%;
  padding: 10px 15px;
  border-radius: 15px;
  margin: 10px;
}

.me {
  background: #ff4d88;
  margin-left: auto;
}

.her {
  background: #333;
}

/* STORY */
.story {
  text-align: center;
}

.story img {
  width: 80%;
  max-width: 300px;
  border-radius: 15px;
  margin: 15px;
}

/* ENDING */
.ending {
  text-align: center;
  padding: 40px;
}

.ending h1 {
  color: #ff4d88;
  text-shadow: 0 0 20px #ff4d88;
}

/* LOVE */
.heart {
  position: fixed;
  color: #ff4d88;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh);}
  100% { transform: translateY(-10vh);}
}
</style>
</head>

<body>

<!-- START -->
<div class="start" id="start">
  <h1>Hai Sayang 💖</h1>
  <button onclick="mulai()">Klik Aku</button>
</div>

<!-- VIDEO -->
<div class="video hidden" id="video">
  <video src="video.mp4" autoplay loop></video>
</div>

<!-- CHAT -->
<div class="chat hidden" id="chat">
  <div class="bubble me">Hai kamu ❤️</div>
  <div class="bubble her">Kenapa? 😊</div>
  <div class="bubble me">Aku cuma mau bilang...</div>
  <div class="bubble me">Aku sayang banget sama kamu 💖</div>
  <div class="bubble her">Aku juga sayang kamu 😭</div>
</div>

<!-- STORY -->
<div class="story hidden" id="story">
  <img src="foto1.jpg">
  <img src="foto2.jpg">
  <img src="foto3.jpg">
</div>

<!-- ENDING -->
<div class="ending hidden" id="ending">
  <h1>🎉 Happy Birthday 💖</h1>
  <p>Aku janji akan selalu ada buat kamu… dalam keadaan apapun ❤️</p>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="lagu.mp3" type="audio/mp3">
</audio>

<script>
function mulai() {
  document.getElementById("start").classList.add("hidden");
  document.getElementById("video").classList.remove("hidden");
  document.getElementById("music").play();

  setTimeout(() => {
    document.getElementById("chat").classList.remove("hidden");
  }, 5000);

  setTimeout(() => {
    document.getElementById("story").classList.remove("hidden");
  }, 10000);

  setTimeout(() => {
    document.getElementById("ending").classList.remove("hidden");
  }, 15000);
}

// LOVE EFFECT
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (10 + Math.random() * 20) + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}, 300);
</script>

</body>
</html>
