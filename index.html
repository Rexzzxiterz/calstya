<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday 💖</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>

<style>
body {
  margin:0;
  font-family:sans-serif;
  overflow:hidden;
}

/* INTRO */
.intro {
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(#fff0f5,#ffe4ec);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  z-index:999;
  transition:1.5s;
}

.intro h1 {
  color:#ff8fb1;
  font-size:40px;
  opacity:0;
  transform:translateY(30px);
  transition:1s;
}

.intro p {
  opacity:0;
  margin-top:10px;
  transition:1s;
}

.intro.show h1,
.intro.show p {
  opacity:1;
  transform:translateY(0);
}

/* MAP */
#map {
  height:100vh;
}

/* TITLE */
.title {
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,0.9);
  padding:10px 20px;
  border-radius:20px;
  z-index:999;
}

/* DISTANCE */
.distance {
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#ff8fb1;
  color:white;
  padding:10px 20px;
  border-radius:20px;
  z-index:999;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <h1 id="title">Happy Birthday 💖</h1>
  <p id="name">Callstya Aldevira</p>
  <p style="margin-top:20px;">Klik untuk mulai...</p>
</div>

<!-- MAP UI -->
<div class="title">Pekalongan ❤️ Medan</div>
<div class="distance" id="distance"></div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script>
// INTRO ANIMASI
setTimeout(()=>{
  document.getElementById("intro").classList.add("show");
},300);

// HILANGKAN INTRO
document.getElementById("intro").onclick = () => {
  document.getElementById("intro").style.opacity = "0";
  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.body.style.overflow="auto";
  },1500);
};

// MAP
const pekalongan = [-6.8898,109.6745];
const medan = [3.5952,98.6722];

const map = L.map('map').setView([0,105],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const line = L.polyline([pekalongan,medan],{
  color:'#ff4d88',
  weight:4
}).addTo(map);

map.fitBounds(line.getBounds());

// JARAK
function dist(a,b,c,d){
  const R=6371;
  const dLat=(c-a)*Math.PI/180;
  const dLon=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+
    Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
    Math.sin(dLon/2)**2;
  return R*(2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

document.getElementById("distance").innerHTML =
"Jarak kita ± "+Math.round(dist(...pekalongan,...medan))+" km 💖";
</script>

</body>
</html>
